<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombies Ate My Neighbors — Super Nintendo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 10px 0 20px;
      overflow-x: hidden;
    }

    #console {
      width: 95vw;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      border-radius: 18px 18px 44px 44px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 2px 4px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* ── CONSOLE TOP — match bottom color ── */
    #console-top {
      background: #c0bcb4;
      padding: 7px 7px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .system-label {
      color: #888480;
      font-size: 0.58rem;
      font-weight: bold;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      align-self: center;
    }

    /* Screen */
    #screen-bezel {
      width: 100%;
      background: #2a2830;
      border-radius: 6px;
      padding: 5px;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.6), inset 0 0 0 2px #18161e;
    }

    #screen-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #000;
      overflow: hidden;
      border-radius: 3px;
    }

    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #game canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
    }

    /* scanlines */
    #screen-wrapper::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* LED + cart row */
    #led-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 6px;
      padding: 0 3px;
    }

    #power-led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ee2222;
      box-shadow: 0 0 6px #ee2222, 0 0 12px rgba(238,34,34,0.5);
      animation: blink 3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.3; }
    }

    #cart-slot {
      flex: 1;
      height: 4px;
      background: #a8a49c;
      border-radius: 2px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }

    .game-title {
      color: #888480;
      font-size: 0.48rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── CONSOLE BOTTOM — same SNES gray, slightly deeper ── */
    #console-bottom {
      background: #c0bcb4;
      padding: 0 10px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      border-radius: 0 0 44px 44px;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.12);
    }

    /* Shoulder buttons row */
    #shoulder-row {
      display: flex;
      width: 100%;
      justify-content: space-between;
      padding: 0 0 8px;
      margin-top: -2px;
    }

    .shoulder-btn {
      background: #a8a49c;
      color: #6a6660;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 0 0 10px 10px;
      width: 52px;
      height: 22px;
      cursor: pointer;
      box-shadow: 0 3px 0 #888480, 0 4px 4px rgba(0,0,0,0.3);
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.06s, box-shadow 0.06s;
    }

    .shoulder-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #888480;
    }

    /* Main controls row */
    #controls-row {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 140px;
    }

    /* ── D-PAD (Virtual Joystick) ── */
    #dpad-area {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-container {
      position: relative;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle at 40% 35%, #6e6a64, #4a4640);
      border-radius: 50%;
      border: 2px solid #3e3a36;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      touch-action: none;
      cursor: pointer;
    }

    #joystick-stick {
      position: absolute;
      top: 50%; left: 50%;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at 35% 30%, #8e8a84, #6a6660);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid #5a5650;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      pointer-events: none;
      transition: transform 0.05s ease-out;
      will-change: transform;
    }

    /* ── CENTER BUTTONS (SELECT / START) — diagonal pill buttons ── */
    #center-buttons {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Label sits below each pill */
    .mid-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .mid-btn-label {
      color: #7a7670;
      font-size: 0.36rem;
      letter-spacing: 0.12em;
      font-weight: bold;
      text-transform: uppercase;
    }

    .mid-btn {
      /* Narrow elongated oval, rotated diagonally */
      background: linear-gradient(to bottom, #7a7670, #5e5a56);
      border: none;
      border-radius: 20px;
      width: 46px;
      height: 14px;
      cursor: pointer;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), inset 0 -1px 2px rgba(255,255,255,0.08),
                  0 2px 4px rgba(0,0,0,0.3);
      user-select: none;
      -webkit-user-select: none;
      transform: rotate(-20deg);
      transition: box-shadow 0.06s, transform 0.06s;
      /* No text on pill — label is below */
      font-size: 0;
    }

    .mid-btn:active {
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.55), inset 0 -1px 2px rgba(255,255,255,0.05);
      transform: rotate(-20deg) scale(0.95);
    }

    /* ── FACE BUTTONS — 2×2 on recessed circular well ── */
    #face-platform {
      flex: 0 0 auto;
      position: relative;          /* needed for absolute label positioning */
      width: 160px;
      height: 160px;
      /*
        Platform matches photo: medium lavender-gray, clearly distinct
        from the warm-gray body but NOT as dark as pure mauve.
        Photo shows ~#9090a8 tone with slight depth.
      */
      background:
        radial-gradient(ellipse at 46% 40%, #9e9cb4, #7e7c96);
      border-radius: 50%;
      box-shadow:
        inset 0 5px 14px rgba(0,0,0,0.38),
        inset 0 2px 4px rgba(0,0,0,0.20),
        0 0 0 1.5px rgba(255,255,255,0.12),   /* rim catch-light */
        0 3px 8px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px;
    }

    /* Labels float in the gray platform — not on the button caps */
    .face-label {
      position: absolute;
      font-family: Arial, sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      /*
        From photo: letters are same lavender as body text — muted,
        not white, not neon. Barely-there but legible.
      */
      color: rgba(210, 205, 235, 0.82);
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
    }
    /* Corner positions matching 2×2 layout */
    #lbl-x { top:  11px; left:  20px; }   /* top-left  */
    #lbl-y { top:  11px; right: 20px; }   /* top-right */
    #lbl-b { bottom: 11px; left:  20px; } /* btm-left  */
    #lbl-a { bottom: 11px; right: 20px; } /* btm-right */

    .face-row {
      display: flex;
      gap: 10px;
    }

    .face-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      /* No text on cap — labels float in well */
      font-size: 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.07s, box-shadow 0.07s;
      /*
        Glossy dome cap — 3 gradient layers:
        1. Strong oval specular at upper-left (light catching convex surface)
        2. Faint lower bounce-light
        3. Lavender base matching photo
      */
      background:
        radial-gradient(ellipse 55% 45% at 38% 24%,
          rgba(255,255,255,0.70) 0%,
          rgba(255,255,255,0.22) 35%,
          transparent 58%),
        radial-gradient(ellipse at 62% 78%,
          rgba(255,255,255,0.07) 0%,
          transparent 45%),
        radial-gradient(circle at 50% 55%, #b4a8e4, #7868bc);
      box-shadow:
        0 4px 0 rgba(60,48,140,0.70),       /* hard cast shadow = raised dome */
        0 6px 14px rgba(0,0,0,0.36),
        inset 0 -4px 6px rgba(0,0,0,0.20),  /* lower inside shadow = curvature */
        inset 0 2px 3px rgba(255,255,255,0.22); /* top rim light */
    }

    .face-btn:active {
      transform: scale(0.91);
      box-shadow:
        0 1px 0 rgba(60,48,140,0.60),
        0 2px 5px rgba(0,0,0,0.30),
        inset 0 4px 10px rgba(0,0,0,0.42);
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      z-index: 100;
    }

    /* Desktop hint */
    #kb-hint {
      color: #888480;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 6px 0 0;
      display: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #kb-hint { display: block; }
    }
  </style>
</head>
<body>
<div id="console">

  <!-- TOP: system label → screen → led → game title -->
  <div id="console-top">

    <div class="system-label">Super Nintendo</div>

    <div id="screen-bezel">
      <div id="screen-wrapper">
        <div id="loading">LOADING…</div>
        <div id="game"></div>
      </div>
    </div>

    <div id="led-row">
      <div id="power-led"></div>
      <div id="cart-slot"></div>
    </div>

    <div class="game-title">Zombies Ate My Neighbors</div>
  </div>

  <!-- BOTTOM: controller -->
  <div id="console-bottom">

    <!-- Shoulder buttons -->
    <div id="shoulder-row">
      <button class="shoulder-btn" id="btn-l" aria-label="L">L</button>
      <button class="shoulder-btn" id="btn-r" aria-label="R">R</button>
    </div>

    <!-- Main control row: D-pad · Select/Start · ABXY -->
    <div id="controls-row">

      <!-- D-pad joystick -->
      <div id="dpad-area">
        <div id="joystick-container">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Select / Start — diagonal pill buttons -->
      <div id="center-buttons">
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-select" aria-label="Select"></button>
          <span class="mid-btn-label">Select</span>
        </div>
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-start" aria-label="Start"></button>
          <span class="mid-btn-label">Start</span>
        </div>
      </div>

      <!-- Face buttons: 2×2 — X top-left, Y top-right, B btm-left, A btm-right -->
      <!-- Labels float in the well, not on the caps (matches real controller) -->
      <div id="face-platform">
        <span class="face-label" id="lbl-x" aria-hidden="true">X</span>
        <span class="face-label" id="lbl-y" aria-hidden="true">Y</span>
        <span class="face-label" id="lbl-b" aria-hidden="true">B</span>
        <span class="face-label" id="lbl-a" aria-hidden="true">A</span>
        <div class="face-row">
          <button class="face-btn" id="btn-x" aria-label="X"></button>
          <button class="face-btn" id="btn-y" aria-label="Y"></button>
        </div>
        <div class="face-row">
          <button class="face-btn" id="btn-b" aria-label="B"></button>
          <button class="face-btn" id="btn-a" aria-label="A"></button>
        </div>
      </div>

    </div><!-- /controls-row -->

    <div id="kb-hint">
      ARROWS · Z=B · A=Y · X=A · S=X · Q=L · W=R · ENTER=START · SHIFT=SELECT
    </div>

  </div><!-- /console-bottom -->
</div><!-- /console -->

<script src="SuperNintendo.min.js"></script>
<script>
  // ── Key mapping ──────────────────────────────────────────────────────────
  var player1Keys = {
    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
    b: 'KeyZ', y: 'KeyA', a: 'KeyX', x: 'KeyS',
    l: 'KeyQ', r: 'KeyW',
    start: 'Enter', select: 'ShiftRight'
  };

  function simKey(code, type) {
    document.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
  }

  // ── Load ROM & launch emulator ───────────────────────────────────────────
  fetch('rom.sfc')
    .then(r => r.arrayBuffer())
    .then(function(rom) {
      document.getElementById('loading').style.display = 'none';
      embedSuperNintendo({
        container:          'game',
        name:               'rom.sfc',
        rom:                rom,
        soundEnabled:       true,
        showMobileControls: false,
        player1:            player1Keys,
        cbStarted: function() {
          document.getElementById('loading').style.display = 'none';
        }
      });
    })
    .catch(function(e) {
      document.getElementById('loading').textContent = 'ERROR LOADING ROM';
      console.error(e);
    });

  // ── Button helpers ───────────────────────────────────────────────────────
  var btnKeyMap = {
    'btn-b':      player1Keys.b,
    'btn-y':      player1Keys.y,
    'btn-a':      player1Keys.a,
    'btn-x':      player1Keys.x,
    'btn-l':      player1Keys.l,
    'btn-r':      player1Keys.r,
    'btn-start':  player1Keys.start,
    'btn-select': player1Keys.select
  };

  Object.keys(btnKeyMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var code = btnKeyMap[id];

    el.addEventListener('touchstart', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    }, { passive: false });
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    }, { passive: false });
    el.addEventListener('mousedown', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    });
    el.addEventListener('mouseup', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    });
    el.addEventListener('mouseleave', function(e) {
      simKey(code, 'keyup');
    });
  });

  // ── Virtual joystick ─────────────────────────────────────────────────────
  (function() {
    var container = document.getElementById('joystick-container');
    var stick     = document.getElementById('joystick-stick');
    var touching  = false;
    var centerX, centerY, radius;
    var dirs = { up: false, down: false, left: false, right: false };
    var dirKeys = {
      up:    player1Keys.up,
      down:  player1Keys.down,
      left:  player1Keys.left,
      right: player1Keys.right
    };

    function updateCenter() {
      var r = container.getBoundingClientRect();
      centerX = r.left + r.width  / 2;
      centerY = r.top  + r.height / 2;
      radius  = r.width / 2;
    }

    function setDir(dir, active) {
      if (dirs[dir] === active) return;
      dirs[dir] = active;
      simKey(dirKeys[dir], active ? 'keydown' : 'keyup');
    }

    function processInput(clientX, clientY) {
      var dx = clientX - centerX;
      var dy = clientY - centerY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var maxDist = radius * 0.7;

      // move stick visual
      var sx = Math.min(Math.max(dx, -maxDist), maxDist);
      var sy = Math.min(Math.max(dy, -maxDist), maxDist);
      stick.style.transform = 'translate(calc(-50% + ' + sx + 'px), calc(-50% + ' + sy + 'px))';

      if (dist < radius * 0.3) {
        // dead zone
        setDir('up',    false);
        setDir('down',  false);
        setDir('left',  false);
        setDir('right', false);
        return;
      }

      var angle = Math.atan2(dy, dx); // -π to π

      setDir('up',    angle > -2.75 && angle < -0.39);
      setDir('down',  angle >  0.39 && angle <  2.75);
      setDir('left',  Math.abs(angle) > 1.96);
      setDir('right', Math.abs(angle) < 1.18);
    }

    function releaseAll() {
      setDir('up',    false);
      setDir('down',  false);
      setDir('left',  false);
      setDir('right', false);
      stick.style.transform = 'translate(-50%, -50%)';
      touching = false;
    }

    container.addEventListener('touchstart', function(e) {
      e.preventDefault();
      touching = true;
      updateCenter();
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!touching) return;
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchend',   function(e) { e.preventDefault(); releaseAll(); }, { passive: false });
    container.addEventListener('touchcancel',function(e) { e.preventDefault(); releaseAll(); }, { passive: false });

    // Mouse fallback for desktop testing
    container.addEventListener('mousedown', function(e) {
      touching = true;
      updateCenter();
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', function(e) {
      if (!touching) return;
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', function(e) {
      if (touching) releaseAll();
    });
  })();
</script>
</body>
</html>
