<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombies Ate My Neighbors — Super Nintendo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: #0f0e17;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      padding: 10px 0 20px;
      overflow-x: hidden;
      image-rendering: pixelated;
    }

    /* ══════════════════════════════════════════
       8-BIT PIXEL STYLE — Press Start 2P font
       Hard pixel shadows · flat colors · blocky
       ══════════════════════════════════════════ */

    #console {
      width: 95vw;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      border-radius: 6px;
      /* Pixel-style hard border + offset shadow */
      outline: 3px solid #6a6878;
      box-shadow: 6px 6px 0 #3a3848, 0 0 0 6px #0f0e17;
      overflow: hidden;
    }

    /* ── TOP ── */
    #console-top {
      background: #b8b4bc;
      padding: 8px 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-bottom: 3px solid #8a8898;
    }

    .system-label {
      font-family: 'Press Start 2P', monospace;
      color: #7a7888;
      font-size: 0.40rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 1px 1px 0 #4a4858;
    }

    /* Screen — thick pixel bezel */
    #screen-bezel {
      width: 100%;
      background: #0a0a10;
      border: 3px solid #1a1828;
      padding: 4px;
      box-shadow:
        inset 3px 3px 0 #000,
        3px 3px 0 #4a4858;
    }

    #screen-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #000;
      overflow: hidden;
    }

    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #game canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
    }

    /* CRT scanlines — stronger for 8-bit feel */
    #screen-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #led-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
    }

    /* Square pixel LED */
    #power-led {
      width: 6px; height: 6px;
      border-radius: 0;            /* square! */
      background: #ee2222;
      box-shadow: 2px 2px 0 #880000;
      animation: blink 3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95%           { opacity: 0.2; }
    }

    #cart-slot {
      flex: 1;
      height: 3px;
      background: #8a8898;
    }

    .game-title {
      font-family: 'Press Start 2P', monospace;
      color: #6a6878;
      font-size: 0.34rem;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 1px 1px 0 #3a3848;
    }

    /* ── BOTTOM ── */
    #console-bottom {
      background: #b8b4bc;
      padding: 0 10px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Shoulder buttons — blocky pixel style */
    #shoulder-row {
      display: flex;
      width: 100%;
      justify-content: space-between;
      padding: 0 0 6px;
      margin-top: -2px;
    }

    .shoulder-btn {
      background: #9a98a4;
      color: #d0ccdc;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.40rem;
      border: 2px solid #6a6878;
      border-radius: 0 0 4px 4px;
      width: 48px;
      height: 20px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #4a4858;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.06s, box-shadow 0.06s;
    }

    .shoulder-btn:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    /* ── Controls row ── */
    #controls-row {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 155px;
    }

    /* ── D-PAD
       Flat circle platform + dark cross stick
    ── */
    #dpad-area {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-container {
      position: relative;
      width: 108px;
      height: 108px;
      background: #a8a4b0;
      border-radius: 50%;
      border: 3px solid #6a6878;
      box-shadow: 3px 3px 0 #4a4858;
      touch-action: none;
      cursor: pointer;
    }

    #joystick-stick {
      position: absolute;
      top: 50%; left: 50%;
      width: 48px;
      height: 48px;
      background: #3c3a44;
      border-radius: 50%;
      border: 2px solid #1e1c28;
      transform: translate(-50%, -50%);
      box-shadow: 2px 2px 0 #1e1c28;
      pointer-events: none;
      transition: transform 0.05s ease-out;
      will-change: transform;
    }

    /* ── SELECT / START
       Small dark rectangles, angled, pixel shadow, labels below
    ── */
    #center-buttons {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .mid-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .mid-btn-label {
      font-family: 'Press Start 2P', monospace;
      color: #6a6878;
      font-size: 0.26rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mid-btn {
      background: #3c3a44;
      border: 2px solid #1e1c28;
      border-radius: 2px;
      width: 40px;
      height: 12px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #1e1c28;
      user-select: none;
      -webkit-user-select: none;
      transform: rotate(-16deg);
      transition: transform 0.06s, box-shadow 0.06s;
      font-size: 0;
    }

    .mid-btn:active {
      transform: rotate(-16deg) translate(2px, 2px);
      box-shadow: none;
    }

    /* ══════════════════════════════════════════
       FACE BUTTONS — Diamond: X=12, A=3, B=6, Y=9
       Circular platform with pixel border
       8-bit style: square buttons, hard shadows,
       clear letter labels in pixel font
       ══════════════════════════════════════════ */
    #face-platform {
      flex: 0 0 auto;
      position: relative;
      width: 160px;
      height: 160px;
      background: #9898a8;
      border-radius: 50%;
      border: 3px solid #6a6878;
      box-shadow: 3px 3px 0 #4a4858;
    }

    /* 8-bit face buttons — square with hard pixel shadow */
    .face-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 3px;               /* barely rounded = blocky */
      border: 2px solid #2a1848;
      background: #7868c0;              /* flat purple, all same base */
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      color: #e8e0f8;
      text-shadow: 1px 1px 0 #2a1848;
      box-shadow: 3px 3px 0 #2a1848;   /* hard pixel shadow */
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.06s, transform 0.06s;
    }

    /* Press = shift down-right into the shadow */
    .face-btn:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    /* ── Diamond positions ── */
    /* X — 12 o'clock */
    #btn-x {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #8878d0;
    }
    #btn-x:active {
      transform: translate(calc(-50% + 3px), 13px);
      box-shadow: none;
    }

    /* A — 3 o'clock */
    #btn-a {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #6858b8;
    }
    #btn-a:active {
      transform: translate(3px, calc(-50% + 3px));
      box-shadow: none;
    }

    /* B — 6 o'clock */
    #btn-b {
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #6858b8;
    }
    #btn-b:active {
      transform: translate(calc(-50% + 3px), -3px);
      box-shadow: none;
    }

    /* Y — 9 o'clock */
    #btn-y {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #8878d0;
    }
    #btn-y:active {
      transform: translate(3px, calc(-50% + 3px));
      box-shadow: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5a5870;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.10em;
      z-index: 100;
    }

    /* Desktop hint */
    #kb-hint {
      font-family: 'Press Start 2P', monospace;
      color: #6a6878;
      font-size: 0.28rem;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 8px 0 0;
      line-height: 1.8;
      display: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #kb-hint { display: block; }
    }
  </style>
</head>
<body>
<div id="console">

  <!-- TOP: system label → screen → led → game title -->
  <div id="console-top">

    <div class="system-label">Super Nintendo</div>

    <div id="screen-bezel">
      <div id="screen-wrapper">
        <div id="loading">LOADING…</div>
        <div id="game"></div>
      </div>
    </div>

    <div id="led-row">
      <div id="power-led"></div>
      <div id="cart-slot"></div>
    </div>

    <div class="game-title">Zombies Ate My Neighbors</div>
  </div>

  <!-- BOTTOM: controller -->
  <div id="console-bottom">

    <!-- Shoulder buttons -->
    <div id="shoulder-row">
      <button class="shoulder-btn" id="btn-l" aria-label="L">L</button>
      <button class="shoulder-btn" id="btn-r" aria-label="R">R</button>
    </div>

    <!-- Main control row: D-pad · Select/Start · ABXY -->
    <div id="controls-row">

      <!-- D-pad joystick -->
      <div id="dpad-area">
        <div id="joystick-container">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Select / Start — diagonal pill buttons -->
      <div id="center-buttons">
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-select" aria-label="Select"></button>
          <span class="mid-btn-label">Select</span>
        </div>
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-start" aria-label="Start"></button>
          <span class="mid-btn-label">Start</span>
        </div>
      </div>

      <!-- Face buttons: diamond — X=12, A=3, B=6, Y=9 o'clock -->
      <div id="face-platform">
        <button class="face-btn" id="btn-x" aria-label="X">X</button>
        <button class="face-btn" id="btn-a" aria-label="A">A</button>
        <button class="face-btn" id="btn-b" aria-label="B">B</button>
        <button class="face-btn" id="btn-y" aria-label="Y">Y</button>
      </div>

    </div><!-- /controls-row -->

    <div id="kb-hint">
      ARROWS · Z=B · A=Y · X=A · S=X · Q=L · W=R · ENTER=START · SHIFT=SELECT
    </div>

  </div><!-- /console-bottom -->
</div><!-- /console -->

<script src="SuperNintendo.min.js"></script>
<script>
  // ── Key mapping ──────────────────────────────────────────────────────────
  var player1Keys = {
    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
    b: 'KeyZ', y: 'KeyA', a: 'KeyX', x: 'KeyS',
    l: 'KeyQ', r: 'KeyW',
    start: 'Enter', select: 'ShiftRight'
  };

  function simKey(code, type) {
    document.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
  }

  // ── Load ROM & launch emulator ───────────────────────────────────────────
  fetch('rom.sfc')
    .then(r => r.arrayBuffer())
    .then(function(rom) {
      document.getElementById('loading').style.display = 'none';
      embedSuperNintendo({
        container:          'game',
        name:               'rom.sfc',
        rom:                rom,
        soundEnabled:       true,
        showMobileControls: false,
        player1:            player1Keys,
        cbStarted: function() {
          document.getElementById('loading').style.display = 'none';
        }
      });
    })
    .catch(function(e) {
      document.getElementById('loading').textContent = 'ERROR LOADING ROM';
      console.error(e);
    });

  // ── Button helpers ───────────────────────────────────────────────────────
  var btnKeyMap = {
    'btn-b':      player1Keys.b,
    'btn-y':      player1Keys.y,
    'btn-a':      player1Keys.a,
    'btn-x':      player1Keys.x,
    'btn-l':      player1Keys.l,
    'btn-r':      player1Keys.r,
    'btn-start':  player1Keys.start,
    'btn-select': player1Keys.select
  };

  Object.keys(btnKeyMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var code = btnKeyMap[id];

    el.addEventListener('touchstart', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    }, { passive: false });
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    }, { passive: false });
    el.addEventListener('mousedown', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    });
    el.addEventListener('mouseup', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    });
    el.addEventListener('mouseleave', function(e) {
      simKey(code, 'keyup');
    });
  });

  // ── Virtual joystick ─────────────────────────────────────────────────────
  (function() {
    var container = document.getElementById('joystick-container');
    var stick     = document.getElementById('joystick-stick');
    var touching  = false;
    var centerX, centerY, radius;
    var dirs = { up: false, down: false, left: false, right: false };
    var dirKeys = {
      up:    player1Keys.up,
      down:  player1Keys.down,
      left:  player1Keys.left,
      right: player1Keys.right
    };

    function updateCenter() {
      var r = container.getBoundingClientRect();
      centerX = r.left + r.width  / 2;
      centerY = r.top  + r.height / 2;
      radius  = r.width / 2;
    }

    function setDir(dir, active) {
      if (dirs[dir] === active) return;
      dirs[dir] = active;
      simKey(dirKeys[dir], active ? 'keydown' : 'keyup');
    }

    function processInput(clientX, clientY) {
      var dx = clientX - centerX;
      var dy = clientY - centerY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var maxDist = radius * 0.7;

      // move stick visual
      var sx = Math.min(Math.max(dx, -maxDist), maxDist);
      var sy = Math.min(Math.max(dy, -maxDist), maxDist);
      stick.style.transform = 'translate(calc(-50% + ' + sx + 'px), calc(-50% + ' + sy + 'px))';

      if (dist < radius * 0.3) {
        // dead zone
        setDir('up',    false);
        setDir('down',  false);
        setDir('left',  false);
        setDir('right', false);
        return;
      }

      var angle = Math.atan2(dy, dx); // -π to π

      setDir('up',    angle > -2.75 && angle < -0.39);
      setDir('down',  angle >  0.39 && angle <  2.75);
      setDir('left',  Math.abs(angle) > 1.96);
      setDir('right', Math.abs(angle) < 1.18);
    }

    function releaseAll() {
      setDir('up',    false);
      setDir('down',  false);
      setDir('left',  false);
      setDir('right', false);
      stick.style.transform = 'translate(-50%, -50%)';
      touching = false;
    }

    container.addEventListener('touchstart', function(e) {
      e.preventDefault();
      touching = true;
      updateCenter();
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!touching) return;
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchend',   function(e) { e.preventDefault(); releaseAll(); }, { passive: false });
    container.addEventListener('touchcancel',function(e) { e.preventDefault(); releaseAll(); }, { passive: false });

    // Mouse fallback for desktop testing
    container.addEventListener('mousedown', function(e) {
      touching = true;
      updateCenter();
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', function(e) {
      if (!touching) return;
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', function(e) {
      if (touching) releaseAll();
    });
  })();
</script>
</body>
</html>
