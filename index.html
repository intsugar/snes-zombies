<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombies Ate My Neighbors — Super Nintendo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 10px 0 20px;
      overflow-x: hidden;
    }

    #console {
      width: 95vw;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      border-radius: 18px 18px 44px 44px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 2px 4px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       CONSOLE TOP — light warm gray matching image
       ───────────────────────────────────────────── */
    #console-top {
      background: #d2cec8;
      padding: 7px 7px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    /* Subtle embossed label like "SUPER NINTENDO" text on controller */
    .system-label {
      color: #b4b0ac;
      font-size: 0.52rem;
      font-weight: bold;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-align: center;
      align-self: center;
    }

    /* Screen */
    #screen-bezel {
      width: 100%;
      background: #262430;
      border-radius: 6px;
      padding: 5px;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.65), inset 0 0 0 2px #161420;
    }

    #screen-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #000;
      overflow: hidden;
      border-radius: 3px;
    }

    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #game canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
    }

    /* scanlines */
    #screen-wrapper::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* LED + cart row */
    #led-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 6px;
      padding: 0 3px;
    }

    #power-led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ee2222;
      box-shadow: 0 0 6px #ee2222, 0 0 12px rgba(238,34,34,0.5);
      animation: blink 3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.3; }
    }

    #cart-slot {
      flex: 1;
      height: 4px;
      background: #bab6b0;
      border-radius: 2px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
    }

    .game-title {
      color: #a8a4a0;
      font-size: 0.46rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ─────────────────────────────────────────────
       CONSOLE BOTTOM — exact same light warm gray
       ───────────────────────────────────────────── */
    #console-bottom {
      background: #d2cec8;
      padding: 0 10px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      border-radius: 0 0 44px 44px;
    }

    /* Shoulder buttons — slightly darker warm gray */
    #shoulder-row {
      display: flex;
      width: 100%;
      justify-content: space-between;
      padding: 0 0 8px;
      margin-top: -2px;
    }

    .shoulder-btn {
      background: #bcb8b2;
      color: #888480;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 0 0 10px 10px;
      width: 52px;
      height: 22px;
      cursor: pointer;
      box-shadow: 0 3px 0 #9e9a94, 0 4px 6px rgba(0,0,0,0.25);
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.06s, box-shadow 0.06s;
    }

    .shoulder-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #9e9a94;
    }

    /* Main controls row */
    #controls-row {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 150px;
    }

    /* ─────────────────────────────────────────────
       D-PAD — circular platform same as face well
       ───────────────────────────────────────────── */
    #dpad-area {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer circle matches face-platform: medium lavender-gray */
    #joystick-container {
      position: relative;
      width: 108px;
      height: 108px;
      background: radial-gradient(circle at 44% 40%, #bab6c4, #9e9aac);
      border-radius: 50%;
      border: none;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.22), 0 2px 6px rgba(0,0,0,0.18);
      touch-action: none;
      cursor: pointer;
    }

    /* Inner stick = dark charcoal cross, like the d-pad in photo */
    #joystick-stick {
      position: absolute;
      top: 50%; left: 50%;
      width: 46px;
      height: 46px;
      background: radial-gradient(circle at 38% 32%, #6a6868, #3c3a3a);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.06);
      pointer-events: none;
      transition: transform 0.05s ease-out;
      will-change: transform;
    }

    /* ─────────────────────────────────────────────
       SELECT / START — dark charcoal diagonal pills
       ───────────────────────────────────────────── */
    #center-buttons {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .mid-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mid-btn-label {
      color: #9e9a96;
      font-family: Arial, sans-serif;
      font-size: 0.34rem;
      letter-spacing: 0.14em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .mid-btn {
      background: linear-gradient(170deg, #686462, #484442);
      border: none;
      border-radius: 20px;
      width: 44px;
      height: 13px;
      cursor: pointer;
      /* Recessed pill — strong inset shadows */
      box-shadow:
        inset 0 2px 5px rgba(0,0,0,0.55),
        inset 0 -1px 2px rgba(255,255,255,0.07),
        0 1px 3px rgba(0,0,0,0.3);
      user-select: none;
      -webkit-user-select: none;
      transform: rotate(-18deg);
      transition: box-shadow 0.06s, transform 0.06s;
      font-size: 0;
    }

    .mid-btn:active {
      box-shadow:
        inset 0 3px 7px rgba(0,0,0,0.65),
        inset 0 -1px 1px rgba(255,255,255,0.04);
      transform: rotate(-18deg) scale(0.94);
    }

    /* ─────────────────────────────────────────────
       FACE BUTTONS — 2×2 on circular platform
       Platform: same medium lavender-gray as d-pad
       Top row (X,Y): lighter lavender
       Bottom row (B,A): deeper purple
       ───────────────────────────────────────────── */
    #face-platform {
      flex: 0 0 auto;
      position: relative;
      width: 162px;
      height: 162px;
      background: radial-gradient(circle at 46% 42%, #bab6c4, #9e9aac);
      border-radius: 50%;
      box-shadow:
        inset 0 4px 12px rgba(0,0,0,0.28),
        inset 0 1px 3px rgba(0,0,0,0.16),
        0 0 0 1px rgba(255,255,255,0.10),
        0 3px 8px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
    }

    /* Labels float in platform margin — muted lavender, not neon */
    .face-label {
      position: absolute;
      font-family: Arial, sans-serif;
      font-size: 0.56rem;
      font-weight: 600;
      color: rgba(180, 175, 200, 0.78);
      letter-spacing: 0.03em;
      pointer-events: none;
      user-select: none;
    }
    #lbl-x { top: 12px; left: 18px; }
    #lbl-y { top: 12px; right: 18px; }
    #lbl-b { bottom: 12px; left: 18px; }
    #lbl-a { bottom: 12px; right: 18px; }

    .face-row { display: flex; gap: 10px; }

    /* All buttons: glossy dome cap */
    .face-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      font-size: 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.07s, box-shadow 0.07s;
    }

    .face-btn:active { transform: scale(0.91); }

    /* ── Top row: X and Y — lighter lavender (matches photo's top buttons) */
    #btn-x, #btn-y {
      background:
        radial-gradient(ellipse 58% 48% at 36% 22%,
          rgba(255,255,255,0.72) 0%,
          rgba(255,255,255,0.20) 38%,
          transparent 60%),
        radial-gradient(circle at 50% 58%, #ccc0f0, #9888d8);
      box-shadow:
        0 4px 0 rgba(88,68,168,0.60),
        0 5px 12px rgba(0,0,0,0.30),
        inset 0 -3px 5px rgba(0,0,0,0.18),
        inset 0 2px 2px rgba(255,255,255,0.24);
    }
    #btn-x:active, #btn-y:active {
      box-shadow: 0 1px 0 rgba(88,68,168,0.50), inset 0 3px 8px rgba(0,0,0,0.38);
    }

    /* ── Bottom row: B and A — deeper purple (matches photo's bottom buttons) */
    #btn-b, #btn-a {
      background:
        radial-gradient(ellipse 58% 48% at 36% 22%,
          rgba(255,255,255,0.52) 0%,
          rgba(255,255,255,0.12) 38%,
          transparent 60%),
        radial-gradient(circle at 50% 58%, #8878c8, #5648a0);
      box-shadow:
        0 4px 0 rgba(44,32,100,0.70),
        0 5px 12px rgba(0,0,0,0.36),
        inset 0 -3px 5px rgba(0,0,0,0.22),
        inset 0 2px 2px rgba(255,255,255,0.16);
    }
    #btn-b:active, #btn-a:active {
      box-shadow: 0 1px 0 rgba(44,32,100,0.55), inset 0 3px 8px rgba(0,0,0,0.45);
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      z-index: 100;
    }

    /* Desktop hint */
    #kb-hint {
      color: #888480;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 6px 0 0;
      display: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #kb-hint { display: block; }
    }
  </style>
</head>
<body>
<div id="console">

  <!-- TOP: system label → screen → led → game title -->
  <div id="console-top">

    <div class="system-label">Super Nintendo</div>

    <div id="screen-bezel">
      <div id="screen-wrapper">
        <div id="loading">LOADING…</div>
        <div id="game"></div>
      </div>
    </div>

    <div id="led-row">
      <div id="power-led"></div>
      <div id="cart-slot"></div>
    </div>

    <div class="game-title">Zombies Ate My Neighbors</div>
  </div>

  <!-- BOTTOM: controller -->
  <div id="console-bottom">

    <!-- Shoulder buttons -->
    <div id="shoulder-row">
      <button class="shoulder-btn" id="btn-l" aria-label="L">L</button>
      <button class="shoulder-btn" id="btn-r" aria-label="R">R</button>
    </div>

    <!-- Main control row: D-pad · Select/Start · ABXY -->
    <div id="controls-row">

      <!-- D-pad joystick -->
      <div id="dpad-area">
        <div id="joystick-container">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Select / Start — diagonal pill buttons -->
      <div id="center-buttons">
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-select" aria-label="Select"></button>
          <span class="mid-btn-label">Select</span>
        </div>
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-start" aria-label="Start"></button>
          <span class="mid-btn-label">Start</span>
        </div>
      </div>

      <!-- Face buttons: 2×2 — X top-left, Y top-right, B btm-left, A btm-right -->
      <!-- Labels float in the well, not on the caps (matches real controller) -->
      <div id="face-platform">
        <span class="face-label" id="lbl-x" aria-hidden="true">X</span>
        <span class="face-label" id="lbl-y" aria-hidden="true">Y</span>
        <span class="face-label" id="lbl-b" aria-hidden="true">B</span>
        <span class="face-label" id="lbl-a" aria-hidden="true">A</span>
        <div class="face-row">
          <button class="face-btn" id="btn-x" aria-label="X"></button>
          <button class="face-btn" id="btn-y" aria-label="Y"></button>
        </div>
        <div class="face-row">
          <button class="face-btn" id="btn-b" aria-label="B"></button>
          <button class="face-btn" id="btn-a" aria-label="A"></button>
        </div>
      </div>

    </div><!-- /controls-row -->

    <div id="kb-hint">
      ARROWS · Z=B · A=Y · X=A · S=X · Q=L · W=R · ENTER=START · SHIFT=SELECT
    </div>

  </div><!-- /console-bottom -->
</div><!-- /console -->

<script src="SuperNintendo.min.js"></script>
<script>
  // ── Key mapping ──────────────────────────────────────────────────────────
  var player1Keys = {
    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
    b: 'KeyZ', y: 'KeyA', a: 'KeyX', x: 'KeyS',
    l: 'KeyQ', r: 'KeyW',
    start: 'Enter', select: 'ShiftRight'
  };

  function simKey(code, type) {
    document.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
  }

  // ── Load ROM & launch emulator ───────────────────────────────────────────
  fetch('rom.sfc')
    .then(r => r.arrayBuffer())
    .then(function(rom) {
      document.getElementById('loading').style.display = 'none';
      embedSuperNintendo({
        container:          'game',
        name:               'rom.sfc',
        rom:                rom,
        soundEnabled:       true,
        showMobileControls: false,
        player1:            player1Keys,
        cbStarted: function() {
          document.getElementById('loading').style.display = 'none';
        }
      });
    })
    .catch(function(e) {
      document.getElementById('loading').textContent = 'ERROR LOADING ROM';
      console.error(e);
    });

  // ── Button helpers ───────────────────────────────────────────────────────
  var btnKeyMap = {
    'btn-b':      player1Keys.b,
    'btn-y':      player1Keys.y,
    'btn-a':      player1Keys.a,
    'btn-x':      player1Keys.x,
    'btn-l':      player1Keys.l,
    'btn-r':      player1Keys.r,
    'btn-start':  player1Keys.start,
    'btn-select': player1Keys.select
  };

  Object.keys(btnKeyMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var code = btnKeyMap[id];

    el.addEventListener('touchstart', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    }, { passive: false });
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    }, { passive: false });
    el.addEventListener('mousedown', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    });
    el.addEventListener('mouseup', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    });
    el.addEventListener('mouseleave', function(e) {
      simKey(code, 'keyup');
    });
  });

  // ── Virtual joystick ─────────────────────────────────────────────────────
  (function() {
    var container = document.getElementById('joystick-container');
    var stick     = document.getElementById('joystick-stick');
    var touching  = false;
    var centerX, centerY, radius;
    var dirs = { up: false, down: false, left: false, right: false };
    var dirKeys = {
      up:    player1Keys.up,
      down:  player1Keys.down,
      left:  player1Keys.left,
      right: player1Keys.right
    };

    function updateCenter() {
      var r = container.getBoundingClientRect();
      centerX = r.left + r.width  / 2;
      centerY = r.top  + r.height / 2;
      radius  = r.width / 2;
    }

    function setDir(dir, active) {
      if (dirs[dir] === active) return;
      dirs[dir] = active;
      simKey(dirKeys[dir], active ? 'keydown' : 'keyup');
    }

    function processInput(clientX, clientY) {
      var dx = clientX - centerX;
      var dy = clientY - centerY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var maxDist = radius * 0.7;

      // move stick visual
      var sx = Math.min(Math.max(dx, -maxDist), maxDist);
      var sy = Math.min(Math.max(dy, -maxDist), maxDist);
      stick.style.transform = 'translate(calc(-50% + ' + sx + 'px), calc(-50% + ' + sy + 'px))';

      if (dist < radius * 0.3) {
        // dead zone
        setDir('up',    false);
        setDir('down',  false);
        setDir('left',  false);
        setDir('right', false);
        return;
      }

      var angle = Math.atan2(dy, dx); // -π to π

      setDir('up',    angle > -2.75 && angle < -0.39);
      setDir('down',  angle >  0.39 && angle <  2.75);
      setDir('left',  Math.abs(angle) > 1.96);
      setDir('right', Math.abs(angle) < 1.18);
    }

    function releaseAll() {
      setDir('up',    false);
      setDir('down',  false);
      setDir('left',  false);
      setDir('right', false);
      stick.style.transform = 'translate(-50%, -50%)';
      touching = false;
    }

    container.addEventListener('touchstart', function(e) {
      e.preventDefault();
      touching = true;
      updateCenter();
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!touching) return;
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchend',   function(e) { e.preventDefault(); releaseAll(); }, { passive: false });
    container.addEventListener('touchcancel',function(e) { e.preventDefault(); releaseAll(); }, { passive: false });

    // Mouse fallback for desktop testing
    container.addEventListener('mousedown', function(e) {
      touching = true;
      updateCenter();
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', function(e) {
      if (!touching) return;
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', function(e) {
      if (touching) releaseAll();
    });
  })();
</script>
</body>
</html>
