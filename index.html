<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombies Ate My Neighbors — Super Nintendo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: #2a2a38;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      padding: 10px 0 20px;
      overflow-x: hidden;
    }

    /* ── Console shell — matches flat illustration light cool gray ── */
    #console {
      width: 95vw;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      border-radius: 16px 16px 42px 42px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    /* ── TOP — same cool flat gray as illustration body ── */
    #console-top {
      background: #c8c4ca;
      padding: 8px 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* System label: very subtle embossed, like illustration text */
    .system-label {
      color: #aeaab4;
      font-size: 0.50rem;
      font-weight: 700;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      text-align: center;
    }

    /* Screen bezel */
    #screen-bezel {
      width: 100%;
      background: #1e1c28;
      border-radius: 5px;
      padding: 5px;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.7);
    }

    #screen-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #000;
      overflow: hidden;
      border-radius: 3px;
    }

    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #game canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
    }

    #screen-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #led-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 6px;
      padding: 0 3px;
    }

    #power-led {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ee2222;
      box-shadow: 0 0 5px #ee2222, 0 0 10px rgba(238,34,34,0.4);
      animation: blink 3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.25; }
    }

    #cart-slot {
      flex: 1;
      height: 4px;
      background: #b4b0b8;
      border-radius: 2px;
    }

    .game-title {
      color: #a8a4b0;
      font-size: 0.44rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── BOTTOM — identical flat gray, seamless ── */
    #console-bottom {
      background: #c8c4ca;
      padding: 0 10px 54px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 0 0 42px 42px;
    }

    /* Shoulder buttons */
    #shoulder-row {
      display: flex;
      width: 100%;
      justify-content: space-between;
      padding: 0 0 6px;
      margin-top: -2px;
    }

    .shoulder-btn {
      background: #b8b4bc;
      color: #8a8690;
      font-family: Arial, sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 0 0 10px 10px;
      width: 50px;
      height: 20px;
      cursor: pointer;
      box-shadow: 0 3px 0 #9e9aa4, 0 4px 6px rgba(0,0,0,0.20);
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.06s, box-shadow 0.06s;
    }

    .shoulder-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #9e9aa4;
    }

    /* ── Controls row ── */
    #controls-row {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 152px;
    }

    /* ── D-PAD
       Outer circle: barely distinguishable from body (illustration style)
       Stick: flat dark charcoal cross
    ── */
    #dpad-area {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-container {
      position: relative;
      width: 110px;
      height: 110px;
      /* Very subtle circle — just slightly darker than body */
      background: #bab6be;
      border-radius: 50%;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
      touch-action: none;
      cursor: pointer;
    }

    #joystick-stick {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px;
      height: 50px;
      /* Flat dark charcoal — matches d-pad cross in illustration */
      background: #4e4c4e;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 5px rgba(0,0,0,0.40);
      pointer-events: none;
      transition: transform 0.05s ease-out;
      will-change: transform;
    }

    /* ── SELECT / START
       Flat dark charcoal recessed pills, angled, labels below
    ── */
    #center-buttons {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .mid-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mid-btn-label {
      color: #9e9aa4;
      font-family: Arial, sans-serif;
      font-size: 0.32rem;
      letter-spacing: 0.14em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .mid-btn {
      background: #4e4c4e;
      border: none;
      border-radius: 18px;
      width: 42px;
      height: 12px;
      cursor: pointer;
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.50),
        inset 0 -1px 1px rgba(255,255,255,0.06);
      user-select: none;
      -webkit-user-select: none;
      transform: rotate(-18deg);
      transition: opacity 0.06s, transform 0.06s;
      font-size: 0;
    }

    .mid-btn:active {
      opacity: 0.75;
      transform: rotate(-18deg) scale(0.93);
    }

    /* ── FACE BUTTON PLATFORM
       Key from illustration:
       - Base: medium gray with slight purple #9898a8
       - Diagonal band (lighter top-right / darker bottom-left)
       - Same size circle as d-pad outer ring
    ── */
    #face-platform {
      flex: 0 0 auto;
      position: relative;
      width: 162px;
      height: 162px;
      background:
        /* Diagonal shade — bright upper-right, shadow lower-left */
        linear-gradient(
          135deg,
          rgba(255,255,255,0.13) 0%,
          rgba(255,255,255,0.06) 40%,
          transparent             50%,
          rgba(0,0,0,0.08)       60%,
          rgba(0,0,0,0.14)       100%
        ),
        #9898a8;
      border-radius: 50%;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.22),
        0 2px 8px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
    }

    /* Labels: float in platform margin, muted lavender-gray */
    .face-label {
      position: absolute;
      font-family: Arial, sans-serif;
      font-size: 0.54rem;
      font-weight: 700;
      color: rgba(195, 190, 215, 0.72);
      letter-spacing: 0.02em;
      pointer-events: none;
      user-select: none;
    }
    #lbl-x { top: 13px; left: 20px; }
    #lbl-y { top: 13px; right: 20px; }
    #lbl-b { bottom: 13px; left: 20px; }
    #lbl-a { bottom: 13px; right: 20px; }

    .face-row { display: flex; gap: 10px; }

    /* Shared button base */
    .face-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      font-size: 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.07s, filter 0.07s;
    }

    .face-btn:active {
      transform: scale(0.90);
      filter: brightness(0.88);
    }

    /* ── Top row (X, Y): lighter lavender
       Matches illustration's upper two lighter buttons
    ── */
    #btn-x, #btn-y {
      background:
        radial-gradient(ellipse 60% 50% at 38% 28%,
          rgba(255,255,255,0.65) 0%,
          rgba(255,255,255,0.18) 40%,
          transparent 62%),
        #c0b8e4;
      box-shadow:
        0 4px 0 #9888c8,
        0 5px 10px rgba(0,0,0,0.25);
    }

    /* ── Bottom row (B, A): deeper purple
       Matches illustration's lower two darker buttons
    ── */
    #btn-b, #btn-a {
      background:
        radial-gradient(ellipse 60% 50% at 38% 28%,
          rgba(255,255,255,0.45) 0%,
          rgba(255,255,255,0.10) 40%,
          transparent 62%),
        #6858a8;
      box-shadow:
        0 4px 0 #4a3a88,
        0 5px 10px rgba(0,0,0,0.32);
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      z-index: 100;
    }

    /* Desktop hint */
    #kb-hint {
      color: #888480;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 6px 0 0;
      display: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #kb-hint { display: block; }
    }
  </style>
</head>
<body>
<div id="console">

  <!-- TOP: system label → screen → led → game title -->
  <div id="console-top">

    <div class="system-label">Super Nintendo</div>

    <div id="screen-bezel">
      <div id="screen-wrapper">
        <div id="loading">LOADING…</div>
        <div id="game"></div>
      </div>
    </div>

    <div id="led-row">
      <div id="power-led"></div>
      <div id="cart-slot"></div>
    </div>

    <div class="game-title">Zombies Ate My Neighbors</div>
  </div>

  <!-- BOTTOM: controller -->
  <div id="console-bottom">

    <!-- Shoulder buttons -->
    <div id="shoulder-row">
      <button class="shoulder-btn" id="btn-l" aria-label="L">L</button>
      <button class="shoulder-btn" id="btn-r" aria-label="R">R</button>
    </div>

    <!-- Main control row: D-pad · Select/Start · ABXY -->
    <div id="controls-row">

      <!-- D-pad joystick -->
      <div id="dpad-area">
        <div id="joystick-container">
          <div id="joystick-stick"></div>
        </div>
      </div>

      <!-- Select / Start — diagonal pill buttons -->
      <div id="center-buttons">
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-select" aria-label="Select"></button>
          <span class="mid-btn-label">Select</span>
        </div>
        <div class="mid-btn-wrap">
          <button class="mid-btn" id="btn-start" aria-label="Start"></button>
          <span class="mid-btn-label">Start</span>
        </div>
      </div>

      <!-- Face buttons: 2×2 — X top-left, Y top-right, B btm-left, A btm-right -->
      <!-- Labels float in the well, not on the caps (matches real controller) -->
      <div id="face-platform">
        <span class="face-label" id="lbl-x" aria-hidden="true">X</span>
        <span class="face-label" id="lbl-y" aria-hidden="true">Y</span>
        <span class="face-label" id="lbl-b" aria-hidden="true">B</span>
        <span class="face-label" id="lbl-a" aria-hidden="true">A</span>
        <div class="face-row">
          <button class="face-btn" id="btn-x" aria-label="X"></button>
          <button class="face-btn" id="btn-y" aria-label="Y"></button>
        </div>
        <div class="face-row">
          <button class="face-btn" id="btn-b" aria-label="B"></button>
          <button class="face-btn" id="btn-a" aria-label="A"></button>
        </div>
      </div>

    </div><!-- /controls-row -->

    <div id="kb-hint">
      ARROWS · Z=B · A=Y · X=A · S=X · Q=L · W=R · ENTER=START · SHIFT=SELECT
    </div>

  </div><!-- /console-bottom -->
</div><!-- /console -->

<script src="SuperNintendo.min.js"></script>
<script>
  // ── Key mapping ──────────────────────────────────────────────────────────
  var player1Keys = {
    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
    b: 'KeyZ', y: 'KeyA', a: 'KeyX', x: 'KeyS',
    l: 'KeyQ', r: 'KeyW',
    start: 'Enter', select: 'ShiftRight'
  };

  function simKey(code, type) {
    document.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
  }

  // ── Load ROM & launch emulator ───────────────────────────────────────────
  fetch('rom.sfc')
    .then(r => r.arrayBuffer())
    .then(function(rom) {
      document.getElementById('loading').style.display = 'none';
      embedSuperNintendo({
        container:          'game',
        name:               'rom.sfc',
        rom:                rom,
        soundEnabled:       true,
        showMobileControls: false,
        player1:            player1Keys,
        cbStarted: function() {
          document.getElementById('loading').style.display = 'none';
        }
      });
    })
    .catch(function(e) {
      document.getElementById('loading').textContent = 'ERROR LOADING ROM';
      console.error(e);
    });

  // ── Button helpers ───────────────────────────────────────────────────────
  var btnKeyMap = {
    'btn-b':      player1Keys.b,
    'btn-y':      player1Keys.y,
    'btn-a':      player1Keys.a,
    'btn-x':      player1Keys.x,
    'btn-l':      player1Keys.l,
    'btn-r':      player1Keys.r,
    'btn-start':  player1Keys.start,
    'btn-select': player1Keys.select
  };

  Object.keys(btnKeyMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var code = btnKeyMap[id];

    el.addEventListener('touchstart', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    }, { passive: false });
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    }, { passive: false });
    el.addEventListener('mousedown', function(e) {
      e.preventDefault(); simKey(code, 'keydown');
    });
    el.addEventListener('mouseup', function(e) {
      e.preventDefault(); simKey(code, 'keyup');
    });
    el.addEventListener('mouseleave', function(e) {
      simKey(code, 'keyup');
    });
  });

  // ── Virtual joystick ─────────────────────────────────────────────────────
  (function() {
    var container = document.getElementById('joystick-container');
    var stick     = document.getElementById('joystick-stick');
    var touching  = false;
    var centerX, centerY, radius;
    var dirs = { up: false, down: false, left: false, right: false };
    var dirKeys = {
      up:    player1Keys.up,
      down:  player1Keys.down,
      left:  player1Keys.left,
      right: player1Keys.right
    };

    function updateCenter() {
      var r = container.getBoundingClientRect();
      centerX = r.left + r.width  / 2;
      centerY = r.top  + r.height / 2;
      radius  = r.width / 2;
    }

    function setDir(dir, active) {
      if (dirs[dir] === active) return;
      dirs[dir] = active;
      simKey(dirKeys[dir], active ? 'keydown' : 'keyup');
    }

    function processInput(clientX, clientY) {
      var dx = clientX - centerX;
      var dy = clientY - centerY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var maxDist = radius * 0.7;

      // move stick visual
      var sx = Math.min(Math.max(dx, -maxDist), maxDist);
      var sy = Math.min(Math.max(dy, -maxDist), maxDist);
      stick.style.transform = 'translate(calc(-50% + ' + sx + 'px), calc(-50% + ' + sy + 'px))';

      if (dist < radius * 0.3) {
        // dead zone
        setDir('up',    false);
        setDir('down',  false);
        setDir('left',  false);
        setDir('right', false);
        return;
      }

      var angle = Math.atan2(dy, dx); // -π to π

      setDir('up',    angle > -2.75 && angle < -0.39);
      setDir('down',  angle >  0.39 && angle <  2.75);
      setDir('left',  Math.abs(angle) > 1.96);
      setDir('right', Math.abs(angle) < 1.18);
    }

    function releaseAll() {
      setDir('up',    false);
      setDir('down',  false);
      setDir('left',  false);
      setDir('right', false);
      stick.style.transform = 'translate(-50%, -50%)';
      touching = false;
    }

    container.addEventListener('touchstart', function(e) {
      e.preventDefault();
      touching = true;
      updateCenter();
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!touching) return;
      var t = e.touches[0];
      processInput(t.clientX, t.clientY);
    }, { passive: false });

    container.addEventListener('touchend',   function(e) { e.preventDefault(); releaseAll(); }, { passive: false });
    container.addEventListener('touchcancel',function(e) { e.preventDefault(); releaseAll(); }, { passive: false });

    // Mouse fallback for desktop testing
    container.addEventListener('mousedown', function(e) {
      touching = true;
      updateCenter();
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', function(e) {
      if (!touching) return;
      processInput(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', function(e) {
      if (touching) releaseAll();
    });
  })();
</script>
</body>
</html>
